<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
            color: #e0e0e0;
        }
        .box {
            background: #1e1e1e;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            text-align: center;
        }
        input, button {
            padding: 0.5rem 1rem;
            margin-top: 1rem;
            font-size: 1rem;
            border-radius: 4px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: #fff;
        }
        button {
            cursor: pointer;
            background: #333;
        }
        button:hover {
            background: #444;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div class="box" id="login-box">
        <h1>Entry Point</h1>
        <p>Enter the password to access the content:</p>
        <input type="password" id="passInput"> 
        <br>
        <button class="button" onclick="checkpassword()">Enter</button>
    </div>

    <!-- Secret Content Screen -->
    <div class="box hidden" id="secret-content">
        <h1>Access Granted</h1>
        <p>Welcome to the restricted zone.</p>
        <button id="continueBtn">Continue to Boot</button>
    </div>

    <!-- Boot Screen / Terminal Placeholder -->
    <div class="box hidden" id="boot-screen">
        <div id="terminal">Initializing...</div>
        <div style="background: #444; width: 100%; height: 10px; margin-top: 15px; border-radius: 5px;">
            <div id="bar" style="background: #0f0; width: 0%; height: 100%; border-radius: 5px; transition: width 0.3s;"></div>
        </div>
    </div>

    <script>
        const boot = ["Loading kernel...", "Mounting drives...", "Starting system..."];
        const terminal = document.getElementById("terminal");
        const bar = document.getElementById("bar");
        let line = 0;

        function checkpassword() {
            const password = document.getElementById('passInput').value;
            if (password === "i know") {
             window.location.href="../pages/secrite.html";
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('secret-content').style.display = 'block';
            } 
            else if (password==="student"){
                window.location.href="../index/home.html";
            }

            else{
                alert("Acces Denide")
            }
        }




        document.getElementById("continueBtn").addEventListener("click", () => {
            document.getElementById("secret-content").style.display = "none";
            document.getElementById("boot-screen").style.display = "block";

            line = 0;
            terminal.textContent = "";
            bar.style.width = "0%";

            nextLine();
        });

        function nextLine() {
            if (line >= boot.length) {
                setTimeout(() => {
                    open("index.html", "_self");
                }, 1000);
                return;
            }
            
            terminal.textContent += boot[line] + "\n";
            bar.style.width = `${((line + 1) / boot.length) * 100}%`;
            line++;
            
            setTimeout(nextLine, 500);
        }
    </script>
</body>
</html>
